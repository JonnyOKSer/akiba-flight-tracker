<!-- Akiba Flight Board — a neon flight tracker for the Tokyo trip -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#080510; --bg2:#0e0a1c; --panel:#15102a; --panel2:#1c1536;
    --border:#2c2150; --ink:#ece6ff; --muted:#8d83b8;
    --pink:#ff2d95; --cyan:#19e7ff; --violet:#b14dff;
    --green:#3dff9e; --amber:#ffc043; --red:#ff5d6c;
    --mono:'Share Tech Mono',ui-monospace,'SF Mono',Consolas,monospace;
    --display:'Orbitron',var(--mono);
    --body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--body); color:var(--ink); background:var(--bg);
    background-image:
      radial-gradient(900px 500px at 12% -8%, rgba(255,45,149,.18), transparent 60%),
      radial-gradient(800px 480px at 92% 0%, rgba(25,231,255,.14), transparent 60%),
      radial-gradient(700px 600px at 50% 120%, rgba(177,77,255,.14), transparent 60%),
      linear-gradient(var(--bg2),var(--bg));
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  /* faint Akihabara signage grid + scanlines */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
    background-image:
      linear-gradient(rgba(140,120,200,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,120,200,.05) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(circle at 50% 30%, #000 40%, transparent 90%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:999;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.045) 2px 3px);
    mix-blend-mode:overlay;
  }
  .wrap{position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:26px 18px 80px}

  /* ---------- header / departure board ---------- */
  .topline{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:14px}
  .kanji{font-family:var(--mono); color:var(--cyan); letter-spacing:.32em; font-size:13px;
    text-shadow:0 0 10px rgba(25,231,255,.7)}
  .brand{font-family:var(--display); font-weight:900; font-size:26px; letter-spacing:.06em;
    color:#fff; text-shadow:0 0 14px rgba(255,45,149,.65), 0 0 30px rgba(255,45,149,.35)}
  .brand b{color:var(--pink)}

  .board{
    border:1px solid var(--border); border-radius:14px; padding:20px 22px;
    background:linear-gradient(180deg, #120c24, #0b0818);
    box-shadow:0 0 0 1px rgba(177,77,255,.12) inset, 0 18px 50px rgba(0,0,0,.55),
      0 0 34px rgba(255,45,149,.10);
    position:relative; overflow:hidden;
  }
  .board::before{content:"●  ●  ●"; position:absolute; top:10px; right:16px; letter-spacing:6px;
    font-size:9px; color:var(--violet); opacity:.6}
  .board-label{font-family:var(--mono); font-size:11px; letter-spacing:.34em; color:var(--muted)}
  .board-row{display:flex; align-items:center; gap:22px; flex-wrap:wrap; margin-top:6px}
  .dest{font-family:var(--display); font-weight:900; font-size:42px; letter-spacing:.08em; color:#fff;
    text-shadow:0 0 16px rgba(25,231,255,.55), 0 0 36px rgba(25,231,255,.28)}
  .dest .plane{color:var(--pink); text-shadow:0 0 16px rgba(255,45,149,.7)}

  .counter{display:flex; gap:7px; margin-left:auto}
  .digit{font-family:var(--mono); font-size:38px; font-weight:700; line-height:1;
    background:#06040d; color:var(--amber); padding:10px 12px; border-radius:8px;
    border:1px solid #3a2c12; text-shadow:0 0 14px rgba(255,192,67,.8);
    box-shadow:0 0 20px rgba(255,192,67,.18) inset}
  .counter-cap{font-family:var(--mono); font-size:11px; letter-spacing:.3em; color:var(--amber);
    align-self:flex-end; padding-bottom:6px; opacity:.85}
  .board-sub{font-family:var(--mono); font-size:12.5px; color:var(--muted); margin-top:12px}
  .board-sub b{color:var(--green); text-shadow:0 0 10px rgba(61,255,158,.5)}
  .board-empty{font-family:var(--mono); font-size:13px; color:var(--muted); margin-top:10px}

  /* ---------- kiwi mascot ---------- */
  .board-shell{position:relative}
  .kiwi{position:absolute; right:16px; bottom:-10px; width:80px; height:80px; z-index:2;
    opacity:.9; pointer-events:none;
    filter:drop-shadow(0 0 6px rgba(25,231,255,.5)) drop-shadow(0 0 16px rgba(255,45,149,.22));
    animation:kiwibob 4.6s ease-in-out infinite}
  @keyframes kiwibob{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-5px) rotate(1.5deg)}}
  .kiwi .lid{transform-box:fill-box; transform-origin:center; transform:scaleY(0); animation:kiwiblink 5.4s infinite}
  @keyframes kiwiblink{0%,93%,100%{transform:scaleY(0)} 96%{transform:scaleY(1)}}
  @media (max-width:560px){ .kiwi{width:62px; right:8px; bottom:-8px} }

  /* ---------- controls ---------- */
  .controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:22px 0 18px}
  button,select,input{font-family:var(--body); font-size:14px}
  .btn{cursor:pointer; border-radius:10px; padding:11px 16px; border:1px solid var(--border);
    background:var(--panel); color:var(--ink); transition:transform .08s, box-shadow .2s, border-color .2s; font-weight:600}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.pink{border-color:rgba(255,45,149,.5); color:#fff;
    background:linear-gradient(180deg, rgba(255,45,149,.22), rgba(255,45,149,.08));
    box-shadow:0 0 18px rgba(255,45,149,.25)}
  .btn.pink:hover{box-shadow:0 0 26px rgba(255,45,149,.45)}
  .btn.cyan{border-color:rgba(25,231,255,.5); color:#dffaff;
    background:linear-gradient(180deg, rgba(25,231,255,.18), rgba(25,231,255,.05));
    box-shadow:0 0 18px rgba(25,231,255,.22)}
  .btn.cyan:hover{box-shadow:0 0 26px rgba(25,231,255,.4)}
  .btn.ghost{background:transparent}
  .spacer{flex:1}
  .sort{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px; color:var(--muted)}
  select{background:var(--panel); color:var(--ink); border:1px solid var(--border);
    border-radius:9px; padding:9px 10px}
  .winseg{display:inline-flex; border:1px solid var(--border); border-radius:10px; overflow:hidden}
  .winseg button{background:var(--panel); border:0; color:var(--muted); padding:11px 13px; cursor:pointer;
    font-family:var(--mono); font-size:12px; letter-spacing:.06em; transition:color .2s, background .2s}
  .winseg button.on{background:linear-gradient(180deg, rgba(25,231,255,.18), rgba(25,231,255,.05));
    color:#dffaff; text-shadow:0 0 8px rgba(25,231,255,.5)}
  /* server status bar */
  .srvbar{display:flex; align-items:center; gap:9px; margin:0 0 16px; font-family:var(--mono);
    font-size:12px; color:var(--muted); letter-spacing:.04em}
  .srv-dot{width:9px; height:9px; border-radius:50%; background:var(--muted); flex:none;
    box-shadow:0 0 8px currentColor}
  .srv-dot.live{background:var(--green); color:var(--green)}
  .srv-dot.off{background:var(--amber); color:var(--amber)}
  .srv-dot.err{background:var(--red); color:var(--red)}
  .srvbar b{color:var(--green); text-shadow:0 0 8px rgba(61,255,158,.4)}
  .pill.live{color:#06120c; background:var(--cyan); border-color:var(--cyan); font-weight:700}
  .bestdates{font-family:var(--mono); font-size:11.5px; margin-top:8px; color:var(--violet);
    text-shadow:0 0 8px rgba(177,77,255,.3)}
  .bestdates b{color:var(--green)}

  /* ---------- live fares panel ---------- */
  .fares{margin:0 0 22px; border:1px solid rgba(25,231,255,.35); border-radius:12px;
    background:linear-gradient(180deg, rgba(25,231,255,.06), rgba(0,0,0,0)); padding:16px 18px; display:none}
  .fares.show{display:block}
  .fares h3{margin:0 0 8px; font-family:var(--mono); font-size:12px; letter-spacing:.24em;
    color:var(--cyan); text-shadow:0 0 10px rgba(25,231,255,.5)}
  .fares p{margin:0; line-height:1.55; font-size:14.5px; color:var(--ink); white-space:pre-wrap}
  .fares .note{margin-top:10px; font-family:var(--mono); font-size:11px; color:var(--muted)}
  .dots:after{content:"";animation:dots 1.4s steps(4,end) infinite}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}

  /* ---------- flight cards ---------- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px}
  .card{position:relative; border:1px solid var(--border); border-radius:14px; padding:16px 16px 14px;
    background:linear-gradient(180deg, var(--panel2), var(--panel));
    box-shadow:0 12px 30px rgba(0,0,0,.45); transition:transform .12s, box-shadow .25s, border-color .25s}
  .card:hover{transform:translateY(-3px); border-color:rgba(177,77,255,.55);
    box-shadow:0 16px 40px rgba(0,0,0,.55), 0 0 26px rgba(177,77,255,.22)}
  .card.booked{border-color:rgba(61,255,158,.5); box-shadow:0 12px 30px rgba(0,0,0,.45), 0 0 22px rgba(61,255,158,.18)}
  .badges{position:absolute; top:-10px; left:14px; display:flex; gap:7px}
  .pill{font-family:var(--mono); font-size:10px; letter-spacing:.16em; padding:4px 9px; border-radius:20px;
    border:1px solid; background:#0a0716}
  .pill.cheap{color:var(--cyan); border-color:var(--cyan); text-shadow:0 0 8px rgba(25,231,255,.6)}
  .pill.hit{color:var(--green); border-color:var(--green); text-shadow:0 0 8px rgba(61,255,158,.6)}
  .pill.booked{color:#06120c; background:var(--green); border-color:var(--green); font-weight:700}

  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-top:4px}
  .airline{font-family:var(--display); font-weight:700; font-size:17px; letter-spacing:.03em; color:#fff}
  .flightno{font-family:var(--mono); font-size:11px; color:var(--violet); letter-spacing:.12em}
  .route{font-family:var(--mono); font-size:15px; color:var(--cyan); margin-top:8px; letter-spacing:.06em}
  .route .arrow{color:var(--pink)}
  .meta{font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:4px}
  .meta.dur{color:var(--cyan); opacity:.8; text-shadow:0 0 8px rgba(25,231,255,.25)}

  .price-row{display:flex; align-items:flex-end; justify-content:space-between; gap:10px; margin-top:12px}
  .price{font-family:var(--display); font-weight:900; font-size:28px; color:#fff;
    text-shadow:0 0 14px rgba(255,45,149,.45)}
  .delta{font-family:var(--mono); font-size:12px; padding-bottom:5px}
  .delta.down{color:var(--green)} .delta.up{color:var(--red)} .delta.flat{color:var(--muted)}
  .spark{margin-top:8px}
  .target{font-family:var(--mono); font-size:11.5px; margin-top:8px; color:var(--muted)}
  .target.hit{color:var(--green); text-shadow:0 0 8px rgba(61,255,158,.4)}

  .card-actions{display:flex; gap:7px; margin-top:13px; flex-wrap:wrap}
  .mini{cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:.08em;
    border:1px solid var(--border); background:#0c0820; color:var(--ink); border-radius:8px; padding:7px 10px;
    transition:border-color .2s, color .2s}
  .mini:hover{border-color:var(--cyan); color:var(--cyan)}
  .mini.book:hover{border-color:var(--green); color:var(--green)}
  .mini.del:hover{border-color:var(--red); color:var(--red)}
  .logwrap{display:none; gap:7px; margin-top:10px; align-items:center}
  .logwrap.show{display:flex}
  .logwrap input{width:92px; background:#0a0716; border:1px solid var(--border); color:var(--ink);
    border-radius:8px; padding:8px 9px; font-family:var(--mono)}

  .empty{border:1px dashed var(--border); border-radius:14px; padding:40px 20px; text-align:center;
    color:var(--muted); font-family:var(--mono)}

  /* ---------- modal ---------- */
  .scrim{position:fixed; inset:0; background:rgba(4,2,10,.72); backdrop-filter:blur(3px);
    display:none; align-items:flex-start; justify-content:center; z-index:1000; padding:34px 16px; overflow:auto}
  .scrim.show{display:flex}
  .modal{width:100%; max-width:480px; border:1px solid rgba(177,77,255,.4); border-radius:16px;
    background:linear-gradient(180deg,#181134,#0e0a20); padding:22px;
    box-shadow:0 30px 80px rgba(0,0,0,.7), 0 0 40px rgba(177,77,255,.2)}
  .modal h2{margin:0 0 16px; font-family:var(--display); font-weight:700; font-size:19px; letter-spacing:.04em}
  .field{margin-bottom:12px}
  .field label{display:block; font-family:var(--mono); font-size:11px; letter-spacing:.14em;
    color:var(--muted); margin-bottom:5px; text-transform:uppercase}
  .field input{width:100%; background:#0a0716; border:1px solid var(--border); color:var(--ink);
    border-radius:9px; padding:10px 11px; font-family:var(--mono)}
  .field input:focus{outline:none; border-color:var(--cyan); box-shadow:0 0 0 2px rgba(25,231,255,.18)}
  .two{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .modal-actions{display:flex; gap:10px; margin-top:18px}
  .seg{display:flex; gap:0; border:1px solid var(--border); border-radius:9px; overflow:hidden}
  .seg button{flex:1; background:#0a0716; border:0; color:var(--muted); padding:10px; cursor:pointer; font-family:var(--mono); font-size:12px}
  .seg button.on{background:rgba(61,255,158,.18); color:var(--green)}

  .foot{text-align:center; margin-top:30px; font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.1em}
  .reset{color:var(--muted); text-decoration:underline; cursor:pointer; background:none; border:0; font-family:inherit}
  @media (max-width:560px){
    .dest{font-size:32px} .digit{font-size:30px; padding:8px 9px} .counter{margin-left:0}
    .board-row{gap:14px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>

<div class="wrap">
  <div class="topline">
    <span class="kanji">アキバ・フライトボード</span>
    <span class="brand">AKIBA <b>FLIGHT</b> BOARD</span>
  </div>

  <div class="board-shell">
    <div class="board" id="board"><!-- filled by render --></div>
    <svg class="kiwi" viewBox="0 0 120 120" aria-hidden="true">
      <title>Kiwi — the flightless flight controller</title>
      <defs>
        <linearGradient id="kbody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#19e7ff" stop-opacity=".20"/>
          <stop offset="1" stop-color="#b14dff" stop-opacity=".10"/>
        </linearGradient>
      </defs>
      <!-- legs + feet -->
      <g stroke="#19e7ff" stroke-width="2.4" stroke-linecap="round" fill="none">
        <path d="M56 96 L54 110 M54 110 l-6 4 M54 110 l0 5 M54 110 l6 4"/>
        <path d="M78 96 L80 110 M80 110 l-6 4 M80 110 l0 5 M80 110 l6 4"/>
      </g>
      <!-- body -->
      <ellipse cx="64" cy="68" rx="34" ry="30" fill="url(#kbody)" stroke="#19e7ff" stroke-width="2.4"/>
      <!-- vestigial wing -->
      <path d="M86 60 Q97 70 85 82" fill="none" stroke="#19e7ff" stroke-width="2"/>
      <!-- long kiwi beak -->
      <path d="M33 62 L6 86 L31 73 Z" fill="url(#kbody)" stroke="#ff2d95" stroke-width="2.2" stroke-linejoin="round"/>
      <circle cx="11" cy="83" r="1.4" fill="#ff2d95"/>
      <!-- aviator goggles (he can't fly, but he dreams) -->
      <path d="M42 46 Q64 30 92 52" fill="none" stroke="#ff2d95" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="50" cy="43" r="6" fill="#ff2d95" fill-opacity=".15" stroke="#ff2d95" stroke-width="2"/>
      <!-- blush -->
      <ellipse cx="41" cy="69" rx="5" ry="3" fill="#ff2d95" opacity=".4"/>
      <!-- big anime eye -->
      <circle cx="48" cy="59" r="9" fill="#0a0716" stroke="#19e7ff" stroke-width="1.6"/>
      <circle cx="48" cy="59" r="6" fill="#19e7ff" opacity=".85"/>
      <circle cx="45.5" cy="56.5" r="2.4" fill="#fff"/>
      <circle cx="51" cy="61" r="1.2" fill="#fff" opacity=".8"/>
      <ellipse class="lid" cx="48" cy="59" rx="9.7" ry="9.7" fill="#0e0a1e"/>
    </svg>
  </div>

  <div class="controls">
    <button class="btn pink" id="addBtn" title="Add a flight option to track.">+ Add flight</button>
    <div class="winseg" id="winSeg" title="Window used when scanning for the cheapest departure dates.">
      <button data-mo="3" class="on" title="Scan for the best dates within the next 3 months.">NEXT 3 MO</button>
      <button data-mo="6" title="Scan for the best dates within the next 6 months.">NEXT 6 MO</button>
    </div>
    <button class="btn cyan" id="refreshBtn" title="Pull today's lowest fare for every watched route from Google Flights (uses one search per route).">⟳ Refresh prices</button>
    <span class="spacer"></span>
    <span class="sort">SORT
      <select id="sortSel" title="Reorder the cards below.">
        <option value="price">cheapest first</option>
        <option value="depart">soonest departure</option>
        <option value="added">recently added</option>
      </select>
    </span>
  </div>

  <div class="srvbar" id="srvBar" title="Live tracking status. Active only on the deployed site.">
    <span class="srv-dot" id="srvDot"></span>
    <span id="srvText">Connecting to live tracking…</span>
  </div>

  <div class="fares" id="fares">
    <h3 id="faresTitle">LIVE FARE CHECK · MCO → TOKYO</h3>
    <p id="faresBody"></p>
  </div>

  <div class="grid" id="grid"></div>

  <div class="foot">
    エキスプレス · saved on this device ·
    <button class="reset" id="resetBtn" title="Clear everything and reload the sample flights.">reset all data</button>
  </div>
</div>

<!-- add / edit modal -->
<div class="scrim" id="scrim">
  <div class="modal">
    <h2 id="modalTitle">Add flight</h2>
    <input type="hidden" id="f_id" />
    <div class="two">
      <div class="field"><label>Airline</label><input id="f_airline" placeholder="JAL" /></div>
      <div class="field"><label>Flight no.</label><input id="f_flightno" placeholder="JL 8" /></div>
    </div>
    <div class="two">
      <div class="field"><label>From</label><input id="f_from" value="MCO" /></div>
      <div class="field"><label>To</label><input id="f_to" placeholder="NRT" /></div>
    </div>
    <div class="two">
      <div class="field"><label>Depart</label><input id="f_depart" type="date" /></div>
      <div class="field"><label>Return</label><input id="f_return" type="date" /></div>
    </div>
    <div class="two">
      <div class="field"><label>Stops</label><input id="f_stops" type="number" min="0" value="1" /></div>
      <div class="field"><label>Travel time (each way)</label><input id="f_duration" placeholder="18h 50m" /></div>
    </div>
    <div class="two">
      <div class="field"><label>Current price (USD)</label><input id="f_price" type="number" min="0" placeholder="950" /></div>
      <div class="field"><label>Target price (USD)</label><input id="f_target" type="number" min="0" placeholder="850" /></div>
    </div>
    <div class="field"><label>Booking link</label><input id="f_url" placeholder="https://" /></div>
    <div class="field">
      <label>Status</label>
      <div class="seg" id="statusSeg">
        <button data-st="watching" class="on">WATCHING</button>
        <button data-st="booked">BOOKED</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBtn" style="flex:1">Cancel</button>
      <button class="btn pink" id="saveBtn" style="flex:1">Save flight</button>
    </div>
  </div>
</div>

<script>
const KEY = "akiba_flight_tracker_v1";
let state = { flights: [], openLogs:{} };
let editStatus = "watching";

/* ---------- storage (localStorage — persists in the visitor's browser) ---------- */
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ state = JSON.parse(raw); state.openLogs = {}; return; }
  }catch(e){ /* no saved data yet */ }
  state = { flights: seed(), openLogs:{} };
  save();
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify({flights:state.flights})); }
  catch(e){ /* storage unavailable */ }
}

/* ---------- sample data from our MCO→Tokyo research (edit freely) ---------- */
function seed(){
  return [
    { id:id(), airline:"Air Canada", flightno:"AC via YUL", from:"MCO", to:"NRT",
      depart:"2026-08-27", return:"2026-09-04", stops:1, duration:"20h 25m", target:800,
      url:"", status:"watching", history:[879,858,846] },
    { id:id(), airline:"JAL", flightno:"JL 8", from:"MCO", to:"NRT",
      depart:"2026-09-02", return:"2026-09-10", stops:1, duration:"18h 50m", target:880,
      url:"", status:"watching", history:[1020,990,984] },
    { id:id(), airline:"Delta", flightno:"DL via ATL", from:"MCO", to:"NRT",
      depart:"2026-09-03", return:"2026-09-11", stops:1, duration:"17h 10m", target:850,
      url:"", status:"watching", history:[940,905] },
    { id:id(), airline:"ANA", flightno:"NH via ORD", from:"MCO", to:"HND",
      depart:"2026-08-30", return:"2026-09-07", stops:1, duration:"19h 30m", target:900,
      url:"", status:"watching", history:[998] },
    { id:id(), airline:"Korean Air", flightno:"KE via ICN", from:"MCO", to:"NRT",
      depart:"2026-09-05", return:"2026-09-13", stops:2, duration:"23h 30m", target:980,
      url:"", status:"watching", history:[1120,1075,1045] },
    { id:id(), airline:"United", flightno:"UA via ORD", from:"MCO", to:"HND",
      depart:"2026-08-31", return:"2026-09-08", stops:1, duration:"18h 10m", target:950,
      url:"", status:"watching", history:[1060,1020] },
    { id:id(), airline:"Alaska / JAL", flightno:"AS via SEA", from:"MCO", to:"NRT",
      depart:"2026-09-04", return:"2026-09-12", stops:1, duration:"18h 40m", target:880,
      url:"", status:"watching", history:[980,955,930] }
  ];
}
function id(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// Only allow real web links as booking URLs — blocks javascript:/data: etc. injected via a card's URL field.
function safeUrl(u){ try{ const p=new URL(String(u),location.href); return (p.protocol==="http:"||p.protocol==="https:")?p.href:""; }catch(e){ return ""; } }
const AIRPORTS={MCO:"Orlando",NRT:"Tokyo–Narita",HND:"Tokyo–Haneda",ICN:"Seoul–Incheon",
  YUL:"Montreal",ATL:"Atlanta",ORD:"Chicago O'Hare",SEA:"Seattle",DTW:"Detroit",
  JFK:"New York–JFK",IAD:"Washington–Dulles",EWR:"Newark",LAX:"Los Angeles",SFO:"San Francisco"};
function apName(c){ return AIRPORTS[c]||c; }
function expandCodes(s){ return String(s||"").replace(/\b([A-Z]{3})\b/g, m=> AIRPORTS[m]? m+" ("+AIRPORTS[m]+")" : m); }
function latest(f){ return f.history && f.history.length ? f.history[f.history.length-1] : null; }
function money(n){ return n==null ? "—" : "$"+Number(n).toLocaleString(); }
function daysUntil(d){ if(!d) return null; const ms=new Date(d+"T00:00:00")-new Date(); return Math.ceil(ms/86400000); }

/* ---------- sparkline ---------- */
function spark(h){
  const tip='Price history — each point is a logged price; the line is green when the latest price is at or below the first.';
  if(!h || h.length<2){ return '<svg class="spark" width="120" height="26"><title>Log two or more prices to see the trend.</title></svg>'; }
  const w=120,ht=26,p=3, min=Math.min(...h), max=Math.max(...h), span=(max-min)||1;
  const step=(w-p*2)/(h.length-1);
  const pts=h.map((v,i)=>[p+i*step, ht-p-((v-min)/span)*(ht-p*2)]);
  const d=pts.map((pt,i)=>(i?"L":"M")+pt[0].toFixed(1)+" "+pt[1].toFixed(1)).join(" ");
  const down = h[h.length-1] <= h[0];
  const col = down ? "var(--green)" : "var(--red)";
  const last=pts[pts.length-1];
  return '<svg class="spark" width="'+w+'" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'"><title>'+tip+'</title>'
    +'<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.6" stroke-linejoin="round" '
    +'style="filter:drop-shadow(0 0 4px '+col+')"/>'
    +'<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="2.6" fill="'+col+'"/></svg>';
}

/* ---------- render ---------- */
function render(){
  renderBoard();
  renderCards();
}
function renderBoard(){
  const board=document.getElementById("board");
  const booked=state.flights.filter(f=>f.status==="booked" && daysUntil(f.depart)!=null && daysUntil(f.depart)>=0)
    .sort((a,b)=>daysUntil(a.depart)-daysUntil(b.depart));
  if(booked.length){
    const f=booked[0]; const days=daysUntil(f.depart);
    const digits=String(days).padStart(3,"0").split("").map(d=>'<span class="digit">'+d+'</span>').join("");
    board.innerHTML =
      '<div class="board-label">NEXT DEPARTURE</div>'+
      '<div class="board-row">'+
        '<div class="dest"><span class="plane">✈</span> '+esc(f.to==="HND"?"TOKYO·HND":"TOKYO")+'</div>'+
        '<div class="counter" title="Days until your earliest booked departure ('+esc(f.depart)+').">'+digits+'</div>'+
        '<div class="counter-cap">DAYS</div>'+
      '</div>'+
      '<div class="board-sub">BOOKED · <b>'+esc(f.airline)+' '+esc(f.flightno)+'</b> · '+
        esc(f.from)+' → '+esc(f.to)+' · departs '+esc(f.depart)+' · '+money(latest(f))+'</div>';
  } else {
    board.innerHTML =
      '<div class="board-label">NEXT DEPARTURE</div>'+
      '<div class="board-row"><div class="dest"><span class="plane">✈</span> TOKYO</div>'+
        '<div class="counter"><span class="digit">–</span><span class="digit">–</span><span class="digit">–</span></div>'+
        '<div class="counter-cap">DAYS</div></div>'+
      '<div class="board-empty">No flight booked yet — mark a card as BOOKED to start the countdown to Tokyo.</div>';
  }
}
function cheapestId(){
  let best=null, val=Infinity;
  state.flights.forEach(f=>{
    const sh=serverHistory(routeKey(f));
    const p=(sh && sh.length)? sh[sh.length-1] : latest(f);
    if(p!=null && p<val){ val=p; best=f.id; }
  });
  return best;
}
function renderCards(){
  const grid=document.getElementById("grid");
  if(!state.flights.length){
    grid.innerHTML='<div class="empty">No flights tracked yet.<br/>Tap “+ Add flight” to start watching one.</div>';
    return;
  }
  const sort=document.getElementById("sortSel").value;
  let list=[...state.flights];
  if(sort==="price") list.sort((a,b)=>( latest(a)??1e9)-(latest(b)??1e9));
  else if(sort==="depart") list.sort((a,b)=>(new Date(a.depart||"2999")-new Date(b.depart||"2999")));
  else list.reverse();
  const cheap=cheapestId();

  grid.innerHTML = list.map(f=>{
    const route=routeKey(f);
    const srvHist=serverHistory(route);
    const live=!!(srvHist && srvHist.length);
    const histArr=live ? srvHist : (f.history||[]);
    const cur=live ? srvHist[srvHist.length-1] : latest(f);
    const prev=histArr.length>1 ? histArr[histArr.length-2] : null;
    const dsrc=live ? "the previous tracked low" : "your previous logged price";
    let delta='<span class="delta flat" title="No change since '+dsrc+'.">— no change</span>';
    if(prev!=null && cur!=null){
      const d=cur-prev;
      if(d<0) delta='<span class="delta down" title="Down $'+Math.abs(d).toLocaleString()+' from '+dsrc+'.">▼ $'+Math.abs(d).toLocaleString()+'</span>';
      else if(d>0) delta='<span class="delta up" title="Up $'+d.toLocaleString()+' from '+dsrc+'.">▲ $'+d.toLocaleString()+'</span>';
    }
    const hit = (f.target!=null && cur!=null && cur<=f.target);
    let targetLine='';
    if(f.target!=null){
      if(hit) targetLine='<div class="target hit" title="Your latest logged price is at or below your goal price.">★ TARGET HIT · goal '+money(f.target)+'</div>';
      else if(cur!=null) targetLine='<div class="target" title="How much the current price still needs to drop to reach your goal.">'+money(cur-f.target)+' above goal of '+money(f.target)+'</div>';
      else targetLine='<div class="target" title="Your goal price. Log a price to see how close you are.">goal '+money(f.target)+'</div>';
    }
    const badges=[];
    if(live) badges.push('<span class="pill live" title="Lowest round-trip fare, tracked daily from Google Flights via SerpApi.">LIVE</span>');
    if(f.status==="booked") badges.push('<span class="pill booked" title="You\u2019ve booked this flight. It drives the countdown above.">BOOKED</span>');
    if(f.id===cheap && f.status!=="booked") badges.push('<span class="pill cheap" title="Lowest current price among your tracked flights.">CHEAPEST</span>');
    if(hit && f.status!=="booked") badges.push('<span class="pill hit" title="Latest logged price has reached your goal price.">TARGET HIT</span>');

    const sb=server.best ? server.best[route] : null;
    let bestLine='';
    if(sb && sb.best){
      bestLine='<div class="bestdates" title="Cheapest departure found when scanning the selected window for this route.">★ Cheapest in window: depart <b>'+esc(prettyDate(sb.best.outbound))+'</b> → '+money(sb.best.price)+' <span style="color:var(--muted)">('+esc(sb.months)+'mo · '+esc(sb.nights)+'n)</span></div>';
    }
    const safeBook = safeUrl(f.url);
    const bookLink = safeBook ? '<a class="mini" href="'+esc(safeBook)+'" target="_blank" rel="noopener noreferrer">OPEN BOOKING ↗</a>' : '';
    const logOpen = state.openLogs[f.id] ? ' show':'';
    return ''+
    '<div class="card'+(f.status==="booked"?" booked":"")+'">'+
      '<div class="badges">'+badges.join("")+'</div>'+
      '<div class="card-top">'+
        '<div><div class="airline">'+esc(f.airline||"Flight")+'</div>'+
        '<div class="flightno" title="Carrier &amp; connecting hub — '+esc(expandCodes(f.flightno||""))+'">'+esc(f.flightno||"")+'</div></div>'+
      '</div>'+
      '<div class="route" title="'+esc(apName(f.from)+" → "+apName(f.to))+'">'+esc(f.from)+' <span class="arrow">→</span> '+esc(f.to)+'</div>'+
      '<div class="meta">'+esc(f.depart||"—")+' → '+esc(f.return||"—")+' · '+(f.stops==0?"nonstop":esc(f.stops)+" stop"+(f.stops==1?"":"s"))+'</div>'+
      (f.duration?'<div class="meta dur" title="Approximate total travel time one way, including layovers.">✈ '+esc(f.duration)+' each way</div>':'')+
      '<div class="price-row"><div class="price" title="'+(live?"Lowest round-trip fare from Google Flights, tracked daily.":"Most recent logged price.")+'">'+money(cur)+'</div>'+delta+'</div>'+
      spark(histArr)+
      targetLine+
      bestLine+
      '<div class="card-actions">'+
        '<button class="mini best" data-act="best" data-id="'+f.id+'" data-route="'+esc(route)+'" title="Scan the selected window for this route\u2019s cheapest departure (uses ~6 SerpApi searches).">⌖ FIND BEST DATES</button>'+
        '<button class="mini logtog" data-id="'+f.id+'" title="Record a price manually (overrides live tracking for this card).">+ LOG</button>'+
        '<button class="mini book" data-act="book" data-id="'+f.id+'" title="'+(f.status==="booked"?"Move back to watching.":"Mark as booked — starts the countdown above.")+'">'+(f.status==="booked"?"UNBOOK":"BOOK IT")+'</button>'+
        '<button class="mini" data-act="edit" data-id="'+f.id+'">EDIT</button>'+
        '<button class="mini del" data-act="del" data-id="'+f.id+'">DEL</button>'+
        bookLink+
      '</div>'+
      '<div class="logwrap'+logOpen+'" data-log="'+f.id+'">'+
        '<input type="number" min="0" placeholder="new price" data-price="'+f.id+'" />'+
        '<button class="mini" data-act="savelog" data-id="'+f.id+'">SAVE</button>'+
      '</div>'+
    '</div>';
  }).join("");
}

/* ---------- modal ---------- */
function openModal(f){
  document.getElementById("modalTitle").textContent = f ? "Edit flight" : "Add flight";
  document.getElementById("f_id").value = f?f.id:"";
  const g=id=>document.getElementById(id);
  g("f_airline").value=f?f.airline||"":"";
  g("f_flightno").value=f?f.flightno||"":"";
  g("f_from").value=f?f.from||"MCO":"MCO";
  g("f_to").value=f?f.to||"":"";
  g("f_depart").value=f?f.depart||"":"";
  g("f_return").value=f?f.return||"":"";
  g("f_stops").value=f?(f.stops??1):1;
  g("f_duration").value=f?f.duration||"":"";
  g("f_price").value=f?(latest(f)??""):"";
  g("f_target").value=f?(f.target??""):"";
  g("f_url").value=f?f.url||"":"";
  editStatus=f?f.status||"watching":"watching";
  syncSeg();
  document.getElementById("scrim").classList.add("show");
}
function closeModal(){ document.getElementById("scrim").classList.remove("show"); }
function syncSeg(){
  document.querySelectorAll("#statusSeg button").forEach(b=>b.classList.toggle("on", b.dataset.st===editStatus));
}
async function saveFromModal(){
  const g=id=>document.getElementById(id).value.trim();
  const fid=g("f_id");
  const price=g("f_price")===""?null:Number(g("f_price"));
  const target=g("f_target")===""?null:Number(g("f_target"));
  const base={ airline:g("f_airline"), flightno:g("f_flightno"), from:g("f_from")||"MCO",
    to:g("f_to"), depart:g("f_depart"), return:g("f_return"),
    stops:Number(document.getElementById("f_stops").value||0), duration:g("f_duration"), target, url:g("f_url"), status:editStatus };
  if(fid){
    const f=state.flights.find(x=>x.id===fid);
    Object.assign(f,base);
    if(price!=null){ if(!f.history) f.history=[]; if(latest(f)!==price) f.history.push(price); }
  } else {
    state.flights.push({ id:id(), ...base, history: price!=null?[price]:[] });
  }
  await save(); closeModal(); render();
}

/* ---------- live tracking via SerpApi (Google Flights) ---------- */
let scanMonths = 3;
let server = { histories:{}, best:{}, quota:null, lastRun:null, available:false };

function routeKey(f){ return ((f.from||"")+"-"+(f.to||"")).toUpperCase(); }
function dedupeRoutes(){
  const seen={}, out=[];
  for(const f of state.flights){
    const r=routeKey(f); if(!r||r==="-"||seen[r]) continue; seen[r]=1;
    let nights=8;
    if(f.depart && f.return){ const d=(new Date(f.return)-new Date(f.depart))/86400000; if(d>0) nights=Math.round(d); }
    out.push({ from:f.from, to:f.to, target_date:f.depart||null, nights });
  }
  return out;
}
function srvStatus(kind, html){
  const dot=document.getElementById("srvDot"), txt=document.getElementById("srvText");
  dot.className="srv-dot"+(kind?" "+kind:"");
  txt.innerHTML=html;
}
function ago(iso){
  if(!iso) return "never";
  const mins=Math.round((Date.now()-new Date(iso))/60000);
  if(mins<1) return "just now";
  if(mins<60) return mins+"m ago";
  const h=Math.round(mins/60); if(h<24) return h+"h ago";
  return Math.round(h/24)+"d ago";
}
function prettyDate(s){ try{ return new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }catch(e){ return s; } }
function renderServerBar(){
  if(!server.available){ srvStatus("off","Live tracking runs on the deployed site — not in this preview."); return; }
  const q=server.quota;
  const quotaTxt = q && q.left!=null ? ("<b>"+q.left+"</b> of "+(q.limit||"?")+" SerpApi searches left this month") : "quota unknown";
  const upd = server.lastRun ? ("prices updated "+ago(server.lastRun.t)) : "no prices pulled yet — hit Refresh prices";
  srvStatus("live", "Live tracking on · "+quotaTxt+" · "+upd);
}
async function syncWatchlist(){
  try{
    await fetch("/.netlify/functions/api?action=watchlist",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ routes: dedupeRoutes() })
    });
  }catch(e){}
}
async function loadServerState(){
  try{
    const r=await fetch("/.netlify/functions/api?action=state");
    if(!r.ok) throw new Error("status "+r.status);
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    server={ ...d, available:true };
    renderServerBar(); render();
  }catch(e){
    server.available=false; renderServerBar();
  }
}
async function refreshPrices(){
  const btn=document.getElementById("refreshBtn");
  btn.disabled=true; srvStatus("","<span class='dots'>Pulling today\u2019s fares from Google Flights</span>");
  try{
    await syncWatchlist();
    const r=await fetch("/.netlify/functions/api?action=refresh",{ method:"POST" });
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    server={ ...d, available:true };
    renderServerBar(); render();
  }catch(e){
    server.available=false;
    srvStatus("err","Couldn\u2019t refresh: "+esc(String(e.message||e))+" — is SERPAPI_KEY set in Netlify?");
  }finally{ btn.disabled=false; }
}
async function findBestDates(route){
  if(!server.available){ alert("Best-date scanning runs on the deployed site, where SerpApi is connected."); return; }
  srvStatus("","<span class='dots'>Scanning "+esc(route)+" for the cheapest "+scanMonths+"-month window</span>");
  try{
    const r=await fetch("/.netlify/functions/api?action=best-dates",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ route, months: scanMonths })
    });
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    await loadServerState();
  }catch(e){
    srvStatus("err","Scan failed: "+esc(String(e.message||e)));
  }
}
// server-tracked price history for a route, as a number array for the sparkline
function serverHistory(route){
  const h=server.histories ? server.histories[route] : null;
  if(!Array.isArray(h)) return null;
  return h.map(x=>x.price).filter(p=>typeof p==="number");
}

/* ---------- events ---------- */
document.getElementById("addBtn").onclick=()=>openModal(null);
document.getElementById("refreshBtn").onclick=refreshPrices;
document.querySelectorAll("#winSeg button").forEach(b=> b.onclick=()=>{
  scanMonths=Number(b.dataset.mo);
  document.querySelectorAll("#winSeg button").forEach(x=>x.classList.toggle("on", x===b));
});
document.getElementById("sortSel").onchange=renderCards;
document.getElementById("cancelBtn").onclick=closeModal;
document.getElementById("saveBtn").onclick=saveFromModal;
document.getElementById("scrim").onclick=(e)=>{ if(e.target.id==="scrim") closeModal(); };
document.querySelectorAll("#statusSeg button").forEach(b=> b.onclick=()=>{ editStatus=b.dataset.st; syncSeg(); });
document.getElementById("resetBtn").onclick=async()=>{
  if(confirm("Reset all tracked flights and reload the sample data?")){
    state={flights:seed(), openLogs:{}}; await save(); render();
  }
};

document.getElementById("grid").addEventListener("click", async (e)=>{
  const t=e.target.closest("[data-act],[data-id].logtog"); if(!t) return;
  const fid=t.dataset.id; const f=state.flights.find(x=>x.id===fid); if(!f) return;
  if(t.classList.contains("logtog")){
    state.openLogs[fid]=!state.openLogs[fid]; renderCards(); return;
  }
  const act=t.dataset.act;
  if(act==="edit"){ openModal(f); }
  else if(act==="best"){ findBestDates(t.dataset.route); }
  else if(act==="del"){ if(confirm("Delete this flight?")){ state.flights=state.flights.filter(x=>x.id!==fid); await save(); render(); } }
  else if(act==="book"){ f.status = f.status==="booked"?"watching":"booked"; await save(); render(); }
  else if(act==="savelog"){
    const inp=document.querySelector('[data-price="'+fid+'"]');
    const v=Number(inp.value);
    if(inp.value!=="" && !isNaN(v)){ if(!f.history) f.history=[]; f.history.push(v); state.openLogs[fid]=false; await save(); render(); }
  }
});

/* ---------- go ---------- */
(async ()=>{
  await load();
  render();
  renderServerBar();
  await syncWatchlist();
  await loadServerState();
})();
</script>
